# This workflow is disabled — no DockerHub account configured.
# To re-enable, add DOCKERHUB_USERNAME and DOCKERHUB_PASSWORD secrets and update the repository name.
name: Update Docker Hub Description (disabled)
on:
  workflow_dispatch:
jobs:
  dockerHubDescription:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Docker Hub Description
        uses: peter-evans/dockerhub-description@v5
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}
          repository: charlocharlie/epicgames-freegames
          readme-filepath: ./Readme.md
